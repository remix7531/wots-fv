# CI for wots+fv.
#
# Three parallel jobs from the same Nix devshell:
#   test   gcc + OCaml-extracted reference library, vector + tamper + CAVS suite
#   check  clang-tidy + -fanalyzer + ASan/UBSan + MSan + CompCert + ctgrind
#          (make check, minus the `prove` step run separately below)
#   prove  VST/Rocq verification (make prove) -- continue-on-error
#          while the proofs are being repaired post-refactor; status
#          stays visible without turning the overall run red.
#
# The flake declares compcert as unfree; we accept it via env so the
# devshell evaluates without prompting.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NIXPKGS_ALLOW_UNFREE: "1"

jobs:
  test:
    name: test (gcc + ocaml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - name: make test
        run: nix develop --impure -c make test
      - name: make test-ocaml
        run: nix develop --impure -c make test-ocaml

  check:
    # `make check` locally also runs `prove`; CI runs the prove step as a
    # separate continue-on-error job so proof regressions stay visible
    # without blocking the rest of the quality gate.
    name: check (tidy + fanalyzer + ASan/UBSan + MSan + CompCert + ctgrind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - name: make check-tidy
        run: nix develop --impure -c make check-tidy
      - name: make check-fanalyzer
        run: nix develop --impure -c make check-fanalyzer
      - name: make check-asan
        run: nix develop --impure -c make check-asan
      - name: make check-msan
        run: nix develop --impure -c make check-msan
      - name: make check-ccomp
        run: nix develop --impure -c make check-ccomp
      - name: make check-ct
        run: nix develop --impure -c make check-ct
      - name: make ocaml-lib
        run: nix develop --impure -c make ocaml-lib
      - name: make extract
        run: nix develop --impure -c make extract

  prove:
    name: prove (Rocq + VST)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - name: make prove
        run: nix develop --impure -c make prove
