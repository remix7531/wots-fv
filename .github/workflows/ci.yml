# CI for wots+fv.
#
# Three parallel jobs from the same Nix devshell:
#   test   gcc + OCaml-extracted reference library, vector + tamper + CAVS suite
#   check  clang-tidy + -fanalyzer + ASan/UBSan + MSan + CompCert + ctgrind
#          (make check, minus the `prove` step run separately below)
#   prove  VST/Rocq verification (make prove)
#
# The flake declares compcert as unfree; we accept it via env so the
# devshell evaluates without prompting.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NIXPKGS_ALLOW_UNFREE: "1"

jobs:
  test:
    name: test (gcc + ocaml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-test-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-test-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-test-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - name: make test
        run: nix develop --impure -c make test
      - name: make test-ocaml
        run: nix develop --impure -c make test-ocaml

  check:
    # `make check` locally also runs `prove`; CI runs the prove step
    # as a separate job for clearer signal.  `check-no-prove` is the
    # Makefile target that lists everything else, so adding a new
    # sub-gate locally picks it up here automatically (no drift).
    name: check (tidy + fanalyzer + ASan/UBSan + MSan + CompCert + ctgrind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-check-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - name: make check-no-prove
        run: nix develop --impure -c make check-no-prove

  prove:
    name: prove (Rocq + VST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-prove-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-prove-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-prove-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - name: make prove
        run: nix develop --impure -c make prove
